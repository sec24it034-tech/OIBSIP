<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My To-Do List</h1>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task...">
            <button id="addTaskBtn">Add Task</button>
        </div>

        <div class="task-sections">
            <div class="section pending-section">
                <h2>Pending Tasks (<span id="pendingCount">0</span>)</h2>
                <ul id="pendingList" class="task-list"></ul>
            </div>

            <div class="section completed-section">
                <h2>Completed Tasks (<span id="completedCount">0</span>)</h2>
                <ul id="completedList" class="task-list"></ul>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h3>Edit Task</h3>
            <input type="text" id="editTaskInput" placeholder="Edit your task...">
            <div class="modal-buttons">
                <button id="saveEditBtn">Save</button>
                <button id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
