<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Authentication System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <!-- Navigation Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="login">Login</button>
                <button class="tab-btn" data-tab="register">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <h2>Welcome Back</h2>
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <div class="error-message" id="login-error"></div>
                <button type="submit" class="btn-primary">Login</button>
            </form>

            <!-- Registration Form -->
            <form id="register-form" class="auth-form">
                <h2>Create Account</h2>
                <div class="form-group">
                    <label for="register-username">Username</label>
                    <input type="text" id="register-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="register-confirm">Confirm Password</label>
                    <input type="password" id="register-confirm" name="confirm" required>
                </div>
                <div class="error-message" id="register-error"></div>
                <button type="submit" class="btn-primary">Register</button>
            </form>
        </div>

        <!-- Protected Dashboard (Hidden by default) -->
        <div id="dashboard" class="dashboard hidden">
            <div class="dashboard-header">
                <h2>Welcome, <span id="user-name"></span>!</h2>
                <button id="logout-btn" class="btn-secondary">Logout</button>
            </div>
            <div class="dashboard-content">
                <div class="success-message">
                    <h3>✅ Login Successful!</h3>
                    <p>You have successfully accessed the protected content.</p>
                </div>
                <div class="info-card">
                    <h3>Your Account Details</h3>
                    <p><strong>Username:</strong> <span id="dashboard-username"></span></p>
                    <p><strong>Email:</strong> <span id="dashboard-email"></span></p>
                    <p><strong>Member since:</strong> <span id="member-since"></span></p>
                </div>
                <div class="protected-content">
                    <h3>🔒 Protected Content</h3>
                    <p>This content is only visible to authenticated users. Your session is secure.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
