<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="converter-card">
            <h1>Temperature Converter</h1>
            
            <div class="input-group">
                <label for="temperature">Enter Temperature:</label>
                <input type="number" id="temperature" placeholder="Enter value" step="any">
            </div>

            <div class="input-group">
                <label>Select Unit:</label>
                <div class="unit-selector">
                    <label class="radio-label">
                        <input type="radio" name="unit" value="celsius" checked>
                        <span>Celsius (°C)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="unit" value="fahrenheit">
                        <span>Fahrenheit (°F)</span>
                    </label>
                    <label class="radio-label">
                        <input type="radio" name="unit" value="kelvin">
                        <span>Kelvin (K)</span>
                    </label>
                </div>
            </div>

            <div class="input-group">
                <label for="convertTo">Convert To:</label>
                <select id="convertTo">
                    <option value="fahrenheit">Fahrenheit (°F)</option>
                    <option value="celsius">Celsius (°C)</option>
                    <option value="kelvin">Kelvin (K)</span></option>
                </select>
            </div>

            <button id="convertBtn">Convert</button>

            <div id="result" class="result"></div>
            <div id="error" class="error"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
